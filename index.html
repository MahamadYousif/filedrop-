<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedDrop - File Transfer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #fafafa;
    }

    .upload-area:hover {
      border-color: #667eea;
      background: #f5f3ff;
    }

    .file-info {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 10px;
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      background: #e8f5e9;
      border-radius: 12px;
      display: none;
    }

    .link-box {
      background: white;
      padding: 12px;
      border-radius: 8px;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      margin: 10px 0;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 15px;
      display: none;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .download-area {
      text-align: center;
      display: none;
    }

    .file-details {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }

    .info {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ SpeedDrop</h1>
    <div class="subtitle">Simple File Sharing</div>

    <!-- Upload Section -->
    <div id="uploadSection">
      <div id="uploadArea" class="upload-area">
        <div style="font-size: 48px;">📁</div>
        <div style="margin-top: 10px;">Click or drag file here</div>
        <div style="font-size: 12px; margin-top: 5px;">No size limit</div>
      </div>
      <input type="file" id="fileInput" style="display: none;">
      
      <div id="fileInfo" class="file-info"></div>
      
      <button id="uploadBtn" class="btn-primary" disabled>Create Share Link</button>
      
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="result-box">
      <div style="font-weight: bold; margin-bottom: 10px;">✅ Your Share Link:</div>
      <div id="shareLink" class="link-box"></div>
      <div class="button-group">
        <button id="copyBtn" class="btn-primary" style="margin: 0;">Copy Link</button>
        <button id="newBtn" class="btn-secondary" style="margin: 0;">New File</button>
      </div>
    </div>

    <!-- Download Section -->
    <div id="downloadSection" class="download-area">
      <div class="file-details">
        <div style="font-size: 48px; margin-bottom: 10px;">📥</div>
        <div id="downloadName" style="font-weight: bold; margin: 10px 0;"></div>
        <div id="downloadSize" style="color: #666; margin: 5px 0;"></div>
        <button id="downloadBtn" class="btn-primary">Download File</button>
        <button id="homeBtn" class="btn-secondary" style="margin-top: 10px;">Upload Files</button>
      </div>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <div class="info">
      💾 Files stored in your browser • Links work on this computer only<br>
      🔗 Share the link - files stay even if you close this tab
    </div>
  </div>

  <script>
    let selectedFile = null;
    
    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function showMessage(type, msg) {
      const el = document.getElementById(type === 'error' ? 'errorMsg' : 'successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
      }, 3000);
    }
    
    function handleFile(file) {
      if (!file) return;
      
      selectedFile = file;
      const info = document.getElementById('fileInfo');
      info.innerHTML = `<strong>${file.name}</strong><br>Size: ${formatBytes(file.size)}`;
      info.style.display = 'block';
      document.getElementById('uploadBtn').disabled = false;
    }
    
    function saveFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const id = Date.now().toString(36) + Math.random().toString(36).substring(2);
          const fileData = {
            id: id,
            name: file.name,
            type: file.type,
            size: file.size,
            data: e.target.result,
            time: Date.now()
          };
          
          let files = JSON.parse(localStorage.getItem('speeddrop_files') || '{}');
          files[id] = fileData;
          localStorage.setItem('speeddrop_files', JSON.stringify(files));
          resolve(id);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    function getFile(id) {
      const files = JSON.parse(localStorage.getItem('speeddrop_files') || '{}');
      return files[id];
    }
    
    async function uploadFile() {
      if (!selectedFile) return;
      
      const btn = document.getElementById('uploadBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      
      btn.disabled = true;
      btn.textContent = 'Saving...';
      progressBar.style.display = 'block';
      
      let progress = 0;
      const interval = setInterval(() => {
        if (progress < 90) {
          progress += 10;
          progressFill.style.width = progress + '%';
        }
      }, 100);
      
      try {
        const fileId = await saveFile(selectedFile);
        
        clearInterval(interval);
        progressFill.style.width = '100%';
        
        setTimeout(() => {
          progressBar.style.display = 'none';
        }, 500);
        
        const link = `${window.location.origin}${window.location.pathname}?id=${fileId}`;
        document.getElementById('shareLink').textContent = link;
        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
        
        showMessage('success', 'File saved! Share the link above.');
        
      } catch (err) {
        clearInterval(interval);
        progressBar.style.display = 'none';
        showMessage('error', 'Failed to save file');
        btn.disabled = false;
        btn.textContent = 'Create Share Link';
      }
    }
    
    function downloadFile(fileId) {
      const fileData = getFile(fileId);
      if (!fileData) {
        showMessage('error', 'File not found');
        return;
      }
      
      const a = document.createElement('a');
      a.href = fileData.data;
      a.download = fileData.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      showMessage('success', 'Download started!');
    }
    
    function showDownloadUI(fileId) {
      const fileData = getFile(fileId);
      if (!fileData) {
        document.getElementById('downloadSection').innerHTML = `
          <div class="file-details">
            <div style="font-size: 48px;">❌</div>
            <div style="margin: 10px 0;">File not found!</div>
            <button onclick="window.location.href=window.location.pathname" class="btn-primary">Go Home</button>
          </div>
        `;
        document.getElementById('downloadSection').style.display = 'block';
        return;
      }
      
      document.getElementById('downloadName').textContent = fileData.name;
      document.getElementById('downloadSize').textContent = formatBytes(fileData.size);
      document.getElementById('downloadSection').style.display = 'block';
      document.getElementById('uploadSection').style.display = 'none';
      
      const downloadBtn = document.getElementById('downloadBtn');
      downloadBtn.onclick = () => downloadFile(fileId);
    }
    
    const params = new URLSearchParams(window.location.search);
    const fileId = params.get('id');
    
    if (fileId) {
      document.getElementById('uploadSection').style.display = 'none';
      showDownloadUI(fileId);
    } else {
      document.getElementById('uploadSection').style.display = 'block';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('downloadSection').style.display = 'none';
      
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const copyBtn = document.getElementById('copyBtn');
      const newBtn = document.getElementById('newBtn');
      const homeBtn = document.getElementById('homeBtn');
      
      uploadArea.onclick = () => fileInput.click();
      
      uploadArea.ondragover = (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#667eea';
      };
      
      uploadArea.ondragleave = () => {
        uploadArea.style.borderColor = '#ddd';
      };
      
      uploadArea.ondrop = (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#ddd';
        const files = e.dataTransfer.files;
        if (files[0]) handleFile(files[0]);
      };
      
      fileInput.onchange = (e) => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
      };
      
      uploadBtn.onclick = uploadFile;
      
      copyBtn.onclick = () => {
        const link = document.getElementById('shareLink').textContent;
        navigator.clipboard.writeText(link);
        showMessage('success', 'Link copied!');
      };
      
      newBtn.onclick = () => {
        window.location.href = window.location.pathname;
      };
      
      homeBtn.onclick = () => {
        window.location.href = window.location.pathname;
      };
    }
  </script>
</body>
</html>
